<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script type="module" src="typer.js" defer></script>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@100..900&display=swap" rel="stylesheet">
    <title>Typer</title>
</head>
<body>
    <div id="authContainer" class="container">
        <h2>Logi sisse, et mängida</h2>
        <button id="loginBtn">Logi sisse Google'iga</button>
    </div>

    <div id="gameMenu" class="container" style="display: none;">
        <h2 id="welcomeMsg"></h2>
        <button id="startGameBtn">Alusta mängu</button>
        <button id="logoutBtn" class="secondary-btn">Vaheta kasutajat / Logi välja</button>
        <button id="showResultsBtn">Näita TOP 20</button>
    </div>

    <div id="counter" class="container">
        <div id="time"></div>
    </div>

    <div id="info" class="container">
        <div id="wordcount"></div>
    </div>

    <div id="wordContainer" class="container">
        <div id="word"></div>
        <div id="score"></div>
        <button id="restartBtn" style="display: none;">Mängi uuesti</button>
        <button id="backToMenuBtn" style="display: none;">Tagasi menüüsse</button>
    </div>

    <div id="resultsModal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>TOP 20</h2>
            <div id="resultsContainer"></div>
        </div>
    </div>
    
</body>
</html>
